# ============================================================
#  tmux configuration — Monokai Pro + Vim-native
# ============================================================

# ----- プラグイン (TPM) -----
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'       # 万人向けベースライン設定
set -g @plugin 'tmux-plugins/tmux-resurrect'       # セッション保存
set -g @plugin 'tmux-plugins/tmux-continuum'       # セッション自動保存/復元
set -g @plugin 'tmux-plugins/tmux-yank'            # クリップボード連携
set -g @plugin 'maxpetretta/tmux-monokai-pro'      # テーマ
set -g @plugin 'christoomey/vim-tmux-navigator'    # Ctrl+hjkl でペイン移動 (Neovim連携)

# ----- Prefix: Ctrl+a -----
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ----- シェル -----
set -g default-shell /opt/homebrew/bin/fish

# ----- ターミナル (Ghostty true color + undercurl) -----
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-ghostty:RGB"
set -s extended-keys on
set -as terminal-features 'xterm-ghostty:extkeys'

# ----- マウス -----
set -g mouse on

# ----- vi モード -----
setw -g mode-keys vi

# ----- ウィンドウ/ペイン番号 (1始まり) -----
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ----- ペイン分割 (直感的なキー) -----
#   prefix + |  → 縦分割 (左右に並ぶ)
#   prefix + -  → 横分割 (上下に並ぶ)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ----- ペインリサイズ (prefix + Shift+矢印) -----
bind -r S-Left  resize-pane -L 5
bind -r S-Right resize-pane -R 5
bind -r S-Up    resize-pane -U 5
bind -r S-Down  resize-pane -D 5

# ----- コピーモード (vi風) -----
#   prefix + [   → コピーモード開始
#   v            → 選択開始
#   y            → コピー (pbcopy経由でシステムクリップボード)
#   prefix + ]   → ペースト
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# ----- 設定リロード (prefix + r) -----
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# ----- テーマ: Monokai Pro -----
set -g status-position top

# ----- セッション自動復元 -----
set -g @continuum-restore 'on'

# ----- TPM初期化 (この行は必ず末尾) -----
run '~/.tmux/plugins/tpm/tpm'
